<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright API Test Results - Allure Report</title>
    <meta http-equiv="refresh" content="0; url=./allure-report/index.html" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .status {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 15px 30px;
            border-radius: 5px;
            margin-bottom: 30px;
            font-weight: bold;
            border: 1px solid #c3e6cb;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            transition: transform 0.2s;
            margin: 10px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Playwright API Test Results</h1>
        <div class="status">✅ All Tests Passing - 100% Success Rate</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number">7</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">7</div>
                <div class="stat-label">Passed</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">100%</div>
                <div class="stat-label">Pass Rate</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">2.9s</div>
                <div class="stat-label">Duration</div>
            </div>
        </div>
        
        <p>Redirecting to Allure Report Dashboard...</p>
        
        <a href="./allure-report/index.html" class="button">📊 View Allure Report</a>
        <a href="./TEST-RESULTS.html" class="button">📋 Test Summary</a>
        
        <p style="font-size: 0.9em; margin-top: 30px; color: #999;">
            If you are not automatically redirected, click the button above.<br>
            <a href="https://github.com/wbandara-tech/Playwright-API-Technical-Assessment" style="color: #667eea; text-decoration: none;">GitHub Repository</a>
        </p>
    </div>
    
    <script>
        // Redirect to Allure report after 2 seconds if not already done
        setTimeout(function() {
            window.location.href = './allure-report/index.html';
        }, 2000);
    </script>
</body>
</html>

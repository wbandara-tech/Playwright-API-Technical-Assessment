name: Playwright Tests & Allure Report

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: https://api.restful-api.dev
        run: npx playwright test
        continue-on-error: true

      - name: Fetch previous report history (for trend graphs)
        if: always()
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git worktree add /tmp/gh-pages-prev origin/gh-pages || exit 0
          if [ -d /tmp/gh-pages-prev/history ]; then
            mkdir -p allure-results/history
            cp -r /tmp/gh-pages-prev/history/. allure-results/history/
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure generate ./allure-results --output allure-report

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
